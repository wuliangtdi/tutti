name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tooling-consistency:
    name: Tooling Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/agent/daemon/go.mod
            packages/agent/daemon/go.sum
            packages/appcli/core/go.mod
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install pinned golangci-lint
        run: |
          version=$(tr -d '\n' < services/tuttid/.golangci-lint-version)
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "${install_dir}" "${version}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Check golangci-lint version pin
        run: node ./tools/scripts/setup-dev.mjs --only=golangci-lint

  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated defaults
        run: pnpm check:defaults-generated

      - name: Check generated API artifacts
        run: pnpm check:api-generated

      - name: Check generated event protocol artifacts
        run: pnpm check:event-protocol-generated

      - name: Check UI boundaries
        run: pnpm check:ui-boundaries

      - name: Check renderer feature boundaries
        run: pnpm check:renderer-boundaries

      - name: Check i18n
        run: pnpm check:i18n

      - name: Run TypeScript lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm lint:ts

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace typecheck
        run: pnpm typecheck

  ts-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript tests
        run: pnpm test:ts

  npm-package-packs:
    name: npm Package Pack Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package tarballs
        run: pnpm release:pack:check

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/agent/daemon/go.mod
            packages/agent/daemon/go.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate builtin apps
        run: pnpm generate:builtin-apps

      - name: Check Codex app-server protocol generation
        run: pnpm check:codexproto-generated

      - name: Run App CLI core tests
        working-directory: packages/appcli/core
        run: go test ./...

      - name: Run shared Workbench service tests
        working-directory: packages/workbench/service
        run: go test ./...

      - name: Run daemon tests
        working-directory: services/tuttid
        run: go test ./...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/appcli/core/go.mod
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate builtin apps
        run: pnpm generate:builtin-apps

      - name: Install pinned golangci-lint
        run: |
          version=$(tr -d '\n' < services/tuttid/.golangci-lint-version)
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "${install_dir}" "${version}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run Go lint
        run: node ./tools/scripts/run-golangci-lint.mjs
