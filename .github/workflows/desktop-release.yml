name: Desktop Release

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Desktop Release · {0} · {1} · {2}', inputs.release_mode, inputs.publication_mode, github.ref_name)
      || format('Desktop Release · {0} · {1}', github.event_name, github.ref_name) }}

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "16 20 * * *"
  workflow_dispatch:
    inputs:
      release_mode:
        description: What to build and publish
        required: true
        type: choice
        default: patch_rc_release
        options:
          - unsigned_dry_run
          - patch_beta_release
          - patch_rc_release
          - patch_release
          - minor_release
          - major_release
          - explicit_version_release
      version:
        description: Release semver for explicit_version_release, such as 0.1.0, 0.1.0-rc.0, or 0.1.0-beta.0
        required: false
        type: string
      target_commitish:
        description: Optional commit-ish override
        required: false
        type: string
      publication_mode:
        description: Publish externally now or keep the signed build as a GitHub draft
        required: true
        type: choice
        default: publish
        options:
          - publish
          - draft_only
      notify_feishu:
        description: Send a Feishu card after publishing
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve:
    if: ${{ vars.TUTTI_DESKTOP_RELEASE_WORKFLOW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      release_dry_run: ${{ steps.mode.outputs.dry_run }}
      release_make_latest: ${{ steps.release.outputs.release_make_latest }}
      release_prerelease: ${{ steps.release.outputs.release_prerelease }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_target: ${{ steps.target.outputs.release_target }}
      release_version: ${{ steps.release.outputs.release_version }}
      release_channel: ${{ steps.release.outputs.release_channel }}
      publication_mode: ${{ steps.publication.outputs.publication_mode }}
      notify_feishu: ${{ steps.notify.outputs.notify_feishu }}

    steps:
      - name: Summarize workflow dispatch inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          WORKFLOW_INPUTS: ${{ toJSON(inputs) }}
        run: |
          {
            echo "## Desktop release request"
            echo
            printf -- '- Triggered by: %s\n' "${GITHUB_ACTOR}"
            printf -- '- Ref: %s\n' "${GITHUB_REF_NAME}"
            printf -- '- Commit: %s\n' "${GITHUB_SHA}"
            echo
            echo "### Workflow dispatch inputs"
            echo
            printf '%s\n' "${WORKFLOW_INPUTS}" | sed 's/^/    /'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          release_target="${{ inputs.target_commitish || github.sha }}"
          echo "release_target=${release_target}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.release_target }}
          fetch-depth: 0

      - name: Validate release dispatch branch
        shell: bash
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ "${RELEASE_EVENT_NAME}" != "workflow_dispatch" ]]; then
            exit 0
          fi

          case "${RELEASE_MODE:-}" in
            patch_rc_release|patch_release|minor_release|major_release)
              ;;
            *)
              exit 0
              ;;
          esac

          if [[ "${RELEASE_REF_TYPE}" != "branch" ]]; then
            echo "Manual desktop release mode ${RELEASE_MODE} must be run from main or a release/* branch." >&2
            exit 1
          fi

          case "${RELEASE_REF_NAME}" in
            main|release/*)
              ;;
            *)
              echo "Manual desktop release mode ${RELEASE_MODE} must be run from main or a release/* branch, not ${RELEASE_REF_NAME}." >&2
              exit 1
              ;;
          esac

          case "${RELEASE_MODE:-}" in
            patch_release|minor_release|major_release)
              ;;
            *)
              exit 0
              ;;
          esac

          if [[ "${RELEASE_REF_NAME}" == "main" ]]; then
            release_branch_refs="$(git ls-remote --heads origin "refs/heads/release/*")"
            if [[ -n "${release_branch_refs}" ]]; then
              echo "Stable desktop release modes must run from a release/* branch while release branches exist." >&2
              echo "Found release branches:" >&2
              printf "%s\n" "${release_branch_refs}" | sed -E "s#^[[:xdigit:]]+[[:space:]]+refs/heads/#- #" >&2
              exit 1
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Resolve release mode
        id: mode
        shell: bash
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_MODE: ${{ inputs.release_mode }}
        run: |
          dry_run=false
          strategy=patch

          if [[ "${RELEASE_EVENT_NAME}" == "schedule" ]]; then
            strategy=patch_rc
          else
          case "${RELEASE_MODE:-}" in
            "")
              strategy=explicit_tag
              ;;
            unsigned_dry_run)
              dry_run=true
              strategy=explicit_version
              ;;
            patch_release)
              strategy=patch
              ;;
            patch_beta_release)
              strategy=patch_beta
              ;;
            minor_release)
              strategy=minor
              ;;
            major_release)
              strategy=major
              ;;
            patch_rc_release)
              strategy=patch_rc
              ;;
            minor_rc_release)
              strategy=minor_rc
              ;;
            major_rc_release)
              strategy=major_rc
              ;;
            explicit_version_release)
              strategy=explicit_version
              ;;
            *)
              echo "Unknown release_mode: ${RELEASE_MODE}" >&2
              exit 1
              ;;
          esac
          fi

          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "strategy=${strategy}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          RELEASE_STRATEGY: ${{ steps.mode.outputs.strategy }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            args=(--strategy explicit_tag --tag "${{ github.ref_name }}" --json)
          else
            args=(--strategy "${RELEASE_STRATEGY}" --json)
            if [[ "${RELEASE_STRATEGY}" == "explicit_version" ]]; then
              version="${INPUT_VERSION:-0.1.0}"
              args+=(--version "${version}")
            fi
            if [[ "${RELEASE_DRY_RUN}" == "true" ]]; then
              args=(node apps/desktop/scripts/resolve-release-tag.mjs "${args[@]}")
            else
              args+=(--target "${{ steps.target.outputs.release_target }}")
              args=(node apps/desktop/scripts/reserve-release-tag.mjs "${args[@]}")
            fi
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            release_json="$(node apps/desktop/scripts/resolve-release-tag.mjs "${args[@]}")"
          else
            release_json="$("${args[@]}")"
          fi
          release_make_latest="$(node -e "process.stdout.write(String(JSON.parse(process.argv[1]).makeLatest))" "${release_json}")"
          release_prerelease="$(node -e "process.stdout.write(String(JSON.parse(process.argv[1]).prerelease))" "${release_json}")"
          release_tag="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).tag)" "${release_json}")"
          release_version="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).version)" "${release_json}")"
          release_channel="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).channel)" "${release_json}")"
          echo "release_make_latest=${release_make_latest}" >> "$GITHUB_OUTPUT"
          echo "release_prerelease=${release_prerelease}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${release_channel}" >> "$GITHUB_OUTPUT"

      - name: Resolve Feishu notification
        id: notify
        shell: bash
        run: echo "notify_feishu=${{ github.event_name != 'workflow_dispatch' || inputs.notify_feishu != false }}" >> "$GITHUB_OUTPUT"

      - name: Resolve publication mode
        id: publication
        shell: bash
        env:
          INPUT_PUBLICATION_MODE: ${{ inputs.publication_mode }}
          RELEASE_EVENT_NAME: ${{ github.event_name }}
        run: |
          publication_mode=publish
          if [[ "${RELEASE_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publication_mode="${INPUT_PUBLICATION_MODE:-publish}"
          fi
          case "${publication_mode}" in
            publish|draft_only)
              ;;
            *)
              echo "Unknown publication_mode: ${publication_mode}" >&2
              exit 1
              ;;
          esac
          echo "publication_mode=${publication_mode}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64, universal]
    env:
      TUTTI_DESKTOP_MAC_ARCH: ${{ matrix.arch }}
      TUTTI_DESKTOP_RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      TUTTI_DESKTOP_RELEASE_TARGET: ${{ needs.resolve.outputs.release_target }}
      TUTTI_DESKTOP_DRY_RUN: ${{ needs.resolve.outputs.release_dry_run }}
      TUTTI_DESKTOP_RELEASE_CHANNEL: ${{ needs.resolve.outputs.release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TUTTI_DESKTOP_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package version with release tag
        working-directory: apps/desktop
        run: node scripts/apply-ci-release-version.mjs "${TUTTI_DESKTOP_RELEASE_TAG}"

      - name: Prepare Apple notarization API key
        if: env.TUTTI_DESKTOP_DRY_RUN != 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "${APPLE_API_KEY_P8_BASE64}" ] || [ -z "${APPLE_API_KEY_ID}" ]; then
            echo "APPLE_API_KEY_P8_BASE64 and APPLE_API_KEY_ID secrets are required for signed macOS releases." >&2
            exit 1
          fi
          apple_api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          node -e "require('node:fs').writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_P8_BASE64, 'base64'))" "${apple_api_key_path}"
          chmod 600 "${apple_api_key_path}"
          echo "APPLE_API_KEY=${apple_api_key_path}" >> "${GITHUB_ENV}"

      - name: Prepare macOS signing certificate
        if: env.TUTTI_DESKTOP_DRY_RUN != 'true'
        env:
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
        run: |
          if [ -z "${MACOS_CSC_LINK}" ] || [ -z "${MACOS_CSC_KEY_PASSWORD}" ]; then
            echo "MACOS_CSC_LINK and MACOS_CSC_KEY_PASSWORD secrets are required for signed macOS releases." >&2
            exit 1
          fi

          case "${MACOS_CSC_LINK}" in
            https://*|file://*|/*|./*|../*|~/*)
              echo "CSC_LINK=${MACOS_CSC_LINK}" >> "${GITHUB_ENV}"
              ;;
            *)
              certificate_path="${RUNNER_TEMP}/macos-codesign-certificate.p12"
              CERTIFICATE_PATH="${certificate_path}" node <<'NODE'
          const fs = require("node:fs");

          const raw = process.env.MACOS_CSC_LINK ?? "";
          const output = process.env.CERTIFICATE_PATH;
          const normalized = raw
            .replace(/\\n/g, "\n")
            .replace(/^data:.*;base64,/, "")
            .replace(/-----BEGIN [^-]+-----/g, "")
            .replace(/-----END [^-]+-----/g, "")
            .replace(/\s+/g, "")
            .replace(/-/g, "+")
            .replace(/_/g, "/");
          const base64 = normalized.padEnd(
            normalized.length + ((4 - (normalized.length % 4)) % 4),
            "="
          );

          if (!/^[A-Za-z0-9+/]*={0,2}$/.test(base64)) {
            throw new Error("MACOS_CSC_LINK must be a URL, path, or base64-encoded .p12 certificate.");
          }

          const bytes = Buffer.from(base64, "base64");
          if (bytes.length === 0 || bytes[0] !== 0x30) {
            throw new Error("MACOS_CSC_LINK did not decode to a valid PKCS#12 certificate.");
          }

          fs.writeFileSync(output, bytes, { mode: 0o600 });
          NODE
              echo "CSC_LINK=${certificate_path}" >> "${GITHUB_ENV}"
              ;;
          esac
          echo "CSC_KEY_PASSWORD=${MACOS_CSC_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Build release artifacts
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ "${TUTTI_DESKTOP_DRY_RUN}" == "true" ]]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
            pnpm --filter @tutti-os/desktop build:mac:unsigned
          else
            pnpm --filter @tutti-os/desktop build:mac:signed
          fi

      - name: Verify prerelease updater metadata
        if: ${{ needs.resolve.outputs.release_channel != 'stable' }}
        run: |
          # The generic updater provider derives the prerelease channel from
          # the version, so electron-builder writes rc-mac.yml or beta-mac.yml
          # directly instead of latest-mac.yml.
          updater_metadata="apps/desktop/dist/${TUTTI_DESKTOP_RELEASE_CHANNEL}-mac.yml"
          if [[ ! -f "${updater_metadata}" ]]; then
            echo "${updater_metadata} is required for the ${TUTTI_DESKTOP_RELEASE_CHANNEL} updater channel." >&2
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tutti-desktop-release-assets-macos-${{ matrix.arch }}
          compression-level: 0
          path: |
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows
    needs: resolve
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      TUTTI_DESKTOP_RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      TUTTI_DESKTOP_RELEASE_TARGET: ${{ needs.resolve.outputs.release_target }}
      TUTTI_DESKTOP_DRY_RUN: ${{ needs.resolve.outputs.release_dry_run }}
      TUTTI_DESKTOP_RELEASE_CHANNEL: ${{ needs.resolve.outputs.release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TUTTI_DESKTOP_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Normalize shell scripts to LF
        run: |
          # Windows checkouts may materialize CRLF even when the git index is LF.
          # Bash packaging scripts fail immediately on `\r` (often in under 2s).
          python - <<'PY'
          from pathlib import Path

          roots = [Path("tools/scripts"), Path("apps/desktop/scripts")]
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if path.suffix.lower() not in {".sh", ".bash"}:
                      continue
                  data = path.read_bytes()
                  normalized = data.replace(b"\r\n", b"\n").replace(b"\r", b"\n")
                  if normalized != data:
                      path.write_bytes(normalized)
                      print(f"normalized LF: {path.as_posix()}")
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package version with release tag
        working-directory: apps/desktop
        run: node scripts/apply-ci-release-version.mjs "${TUTTI_DESKTOP_RELEASE_TAG}"

      - name: Build release artifacts
        env:
          # Windows code signing is optional for now. Keep electron-builder from
          # auto-discovering unrelated certificates on the hosted runner.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          # On Windows, pnpm package scripts default to cmd.exe. The desktop
          # packaging entrypoints are bash scripts, so invoke them directly and
          # force bash for any nested package scripts as well.
          export npm_config_script_shell="$(command -v bash)"
          bash ./tools/scripts/build-desktop-package.sh win

      - name: Verify prerelease updater metadata
        if: ${{ needs.resolve.outputs.release_channel != 'stable' }}
        run: |
          # The generic updater provider derives the prerelease channel from
          # the version, so electron-builder writes rc.yml or beta.yml for
          # Windows instead of latest.yml.
          updater_metadata="apps/desktop/dist/${TUTTI_DESKTOP_RELEASE_CHANNEL}.yml"
          if [[ ! -f "${updater_metadata}" ]]; then
            echo "${updater_metadata} is required for the ${TUTTI_DESKTOP_RELEASE_CHANNEL} updater channel." >&2
            exit 1
          fi

      - name: Collect Windows release artifacts
        run: |
          # Flatten electron-builder outputs so stage can copy files without
          # depending on the preserved apps/desktop/dist/ prefix from upload.
          mkdir -p windows-release-assets
          shopt -s nullglob
          copied=0
          for pattern in \
            apps/desktop/dist/*-win-*.exe \
            apps/desktop/dist/*-win-*.exe.blockmap \
            apps/desktop/dist/latest.yml \
            apps/desktop/dist/rc.yml \
            apps/desktop/dist/beta.yml
          do
            for file in ${pattern}; do
              cp -f "${file}" windows-release-assets/
              copied=$((copied + 1))
            done
          done
          if (( copied == 0 )); then
            echo "No Windows release artifacts found under apps/desktop/dist" >&2
            exit 1
          fi
          if ! compgen -G "windows-release-assets/*-win-*.exe" >/dev/null; then
            echo "Windows NSIS installer (.exe) is required." >&2
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tutti-desktop-release-assets-windows
          compression-level: 0
          path: windows-release-assets/
          if-no-files-found: error
          retention-days: 7

  stage:
    name: Stage Release Draft
    needs: [resolve, build-macos, build-windows]
    if: ${{ github.event_name == 'push' || needs.resolve.outputs.release_dry_run != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.stage-release.outputs.url }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TUTTI_ARTIFACTS_AWS_ROLE_ARN: ${{ vars.TUTTI_ARTIFACTS_AWS_ROLE_ARN }}
      TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL }}
      TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET }}
      TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX }}
      TUTTI_DESKTOP_RELEASE_CHANNEL: ${{ needs.resolve.outputs.release_channel }}
      TUTTI_DESKTOP_RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      TUTTI_DESKTOP_RELEASE_TARGET: ${{ needs.resolve.outputs.release_target }}
      TUTTI_DESKTOP_RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TUTTI_DESKTOP_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Download macOS built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tutti-desktop-release-assets-macos-*
          merge-multiple: false
          path: release-assets-input

      - name: Merge macOS release artifacts and updater metadata
        env:
          RELEASE_CHANNEL: ${{ env.TUTTI_DESKTOP_RELEASE_CHANNEL }}
          RELEASE_VERSION: ${{ env.TUTTI_DESKTOP_RELEASE_VERSION }}
        run: |
          node apps/desktop/scripts/merge-macos-release-artifacts.mjs \
            release-assets-input \
            release-assets

      - name: Download Windows built artifacts
        uses: actions/download-artifact@v4
        with:
          name: tutti-desktop-release-assets-windows
          path: release-assets-windows

      - name: Stage Windows release artifacts
        run: |
          shopt -s nullglob
          windows_files=(
            release-assets-windows/*-win-*.exe
            release-assets-windows/*-win-*.exe.blockmap
            release-assets-windows/latest.yml
            release-assets-windows/rc.yml
            release-assets-windows/beta.yml
          )
          if (( ${#windows_files[@]} == 0 )); then
            echo "No Windows release artifacts found under release-assets-windows" >&2
            exit 1
          fi
          if ! compgen -G "release-assets-windows/*-win-*.exe" >/dev/null; then
            echo "Windows NSIS installer (.exe) is required." >&2
            exit 1
          fi
          cp -f "${windows_files[@]}" release-assets/

      - name: Generate checksums
        run: node apps/desktop/scripts/generate-checksums.mjs release-assets

      - id: stage-release
        name: Stage GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TUTTI_DESKTOP_RELEASE_TAG }}
          target_commitish: ${{ env.TUTTI_DESKTOP_RELEASE_TARGET }}
          name: ${{ env.TUTTI_DESKTOP_RELEASE_TAG }}
          draft: true
          prerelease: ${{ needs.resolve.outputs.release_prerelease == 'true' }}
          make_latest: ${{ needs.resolve.outputs.release_make_latest == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip
          if ! command -v aws >/dev/null 2>&1; then
            case "$(uname -m)" in
              x86_64) awscli_arch="x86_64" ;;
              aarch64|arm64) awscli_arch="aarch64" ;;
              *)
                echo "Unsupported architecture for AWS CLI installer: $(uname -m)" >&2
                exit 1
                ;;
            esac
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${awscli_arch}.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
          fi
          aws --version

      - name: Validate AWS S3 release asset configuration
        run: |
          missing=()
          for name in AWS_REGION TUTTI_ARTIFACTS_AWS_ROLE_ARN TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required AWS S3 release asset configuration: ${missing[*]}" >&2
            exit 1
          fi
          if [[ -z "${TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL:-}" ]]; then
            echo "TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL=https://${TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET}.s3-accelerate.amazonaws.com/${TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX%/}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TUTTI_ARTIFACTS_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload immutable draft assets to AWS S3
        run: |
          remote_dir="s3://${TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET}/${TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX%/}/${TUTTI_DESKTOP_RELEASE_TAG}"
          aws s3 cp release-assets "${remote_dir}" \
            --recursive \
            --cache-control "public, max-age=31536000, immutable"

      - name: Generate desktop release summary
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          RELEASE_CHANNEL: ${{ needs.resolve.outputs.release_channel }}
          RELEASE_TAG: ${{ env.TUTTI_DESKTOP_RELEASE_TAG }}
          RELEASE_TARGET: ${{ env.TUTTI_DESKTOP_RELEASE_TARGET }}
        run: |
          node apps/desktop/scripts/generate-release-summary.mjs \
            --output release-summary.json

      - name: Upload desktop release summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: tutti-desktop-release-summary
          path: release-summary.json

      - name: Update release notes with summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${TUTTI_DESKTOP_RELEASE_TAG}" --json body --jq .body > release-body.md
          node apps/desktop/scripts/upsert-release-summary.mjs \
            release-body.md \
            release-summary.json \
            updated-release-body.md
          gh release edit "${TUTTI_DESKTOP_RELEASE_TAG}" --notes-file updated-release-body.md

  promote:
    name: Promote Release
    needs: [resolve, stage]
    if: ${{ needs.stage.result == 'success' && needs.resolve.outputs.publication_mode == 'publish' }}
    uses: ./.github/workflows/desktop-release-promote.yml
    with:
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      expected_target: ${{ needs.resolve.outputs.release_target }}
      expected_channel: ${{ needs.resolve.outputs.release_channel }}
      source_ref: ${{ github.ref_name }}
      notify_feishu: ${{ needs.resolve.outputs.notify_feishu == 'true' }}
    secrets: inherit

  notify-draft-feishu:
    name: Notify Draft Release
    needs: [resolve, stage]
    if: ${{ needs.stage.result == 'success' && needs.resolve.outputs.publication_mode == 'draft_only' && needs.resolve.outputs.notify_feishu == 'true' }}
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_RELEASE_WEBHOOK_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_BASE_URL }}
      TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_S3_BUCKET }}
      TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX: ${{ vars.TUTTI_DESKTOP_RELEASE_ASSETS_S3_PREFIX }}
      RELEASE_ACTOR: ${{ github.actor }}
      RELEASE_BRANCH: ${{ github.ref_type == 'branch' && github.ref_name || '' }}
      RELEASE_PUBLICATION_STATUS: draft
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_TARGET: ${{ needs.resolve.outputs.release_target }}
      RELEASE_URL: ${{ needs.stage.outputs.release_url }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout notification script
        if: env.FEISHU_WEBHOOK_URL != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.release_target }}

      - name: Setup Node.js
        if: env.FEISHU_WEBHOOK_URL != ''
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Download release summary
        if: env.FEISHU_WEBHOOK_URL != ''
        uses: actions/download-artifact@v4
        with:
          name: tutti-desktop-release-summary
          path: release-summary

      - name: Send draft release card
        if: env.FEISHU_WEBHOOK_URL != ''
        env:
          RELEASE_SUMMARY_PATH: release-summary/release-summary.json
        run: node apps/desktop/scripts/send-release-feishu-card.mjs

      - name: Skip Feishu card
        if: env.FEISHU_WEBHOOK_URL == ''
        run: echo "FEISHU_RELEASE_WEBHOOK_URL is not configured; skipping draft notification."
