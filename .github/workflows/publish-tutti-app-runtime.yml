name: Publish Tutti App Runtime

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region. Defaults to runtime vars, then release vars.
        required: false
        type: string
      aws_role_arn:
        description: AWS role ARN. Defaults to runtime vars, then release vars.
        required: false
        type: string
      s3_bucket:
        description: S3 bucket. Defaults to runtime vars, then release vars.
        required: false
        type: string
      s3_prefix:
        description: S3 prefix. Defaults to runtime vars or tutti-app-runtimes.
        required: false
        type: string
      artifact_base_url:
        description: Public HTTPS base URL matching the S3 prefix, usually a CloudFront URL.
        required: false
        type: string
      cloudfront_distribution_id:
        description: Optional CloudFront distribution id to invalidate after catalog upload.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUNTIME_LOCK_FILE: config/tutti.app-runtime.lock.json

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
            node_distribution: darwin-arm64
          - platform: darwin-amd64
            runner: macos-15-intel
            node_distribution: darwin-x64
          - platform: linux-amd64
            runner: ubuntu-latest
            node_distribution: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Resolve runtime lock
        id: lock
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const lock = JSON.parse(fs.readFileSync(process.env.RUNTIME_LOCK_FILE, "utf8"));
          const platform = process.env.PLATFORM;
          if (!lock.platforms?.[platform]) {
            throw new Error(`runtime lock does not contain ${platform}`);
          }
          for (const [name, value] of [
            ["runtime_version", lock.runtimeVersion],
            ["uv_version", lock.uv?.version],
            ["python_version", lock.python?.version],
            ["node_version", lock.node?.version],
            ["node_release_base_url", lock.node?.releaseBaseUrl],
            ["configured_node_distribution", lock.platforms[platform].nodeDistribution],
            ["configured_runner", lock.platforms[platform].runner]
          ]) {
            if (!value) throw new Error(`runtime lock missing ${name}`);
            console.log(`${name}=${value}`);
          }
          NODE

      - name: Check matrix matches runtime lock
        shell: bash
        env:
          CONFIGURED_NODE_DISTRIBUTION: ${{ steps.lock.outputs.configured_node_distribution }}
          CONFIGURED_RUNNER: ${{ steps.lock.outputs.configured_runner }}
          MATRIX_NODE_DISTRIBUTION: ${{ matrix.node_distribution }}
          MATRIX_RUNNER: ${{ matrix.runner }}
        run: |
          if [ "${CONFIGURED_NODE_DISTRIBUTION}" != "${MATRIX_NODE_DISTRIBUTION}" ]; then
            echo "Matrix node distribution does not match runtime lock" >&2
            exit 1
          fi
          if [ "${CONFIGURED_RUNNER}" != "${MATRIX_RUNNER}" ]; then
            echo "Matrix runner does not match runtime lock" >&2
            exit 1
          fi

      - name: Install build tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync zip

      - name: Install uv
        shell: bash
        env:
          UV_VERSION: ${{ steps.lock.outputs.uv_version }}
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL "https://releases.astral.sh/github/uv/releases/download/${UV_VERSION}/uv-installer.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install managed Python
        shell: bash
        env:
          PYTHON_VERSION: ${{ steps.lock.outputs.python_version }}
        run: |
          export UV_PYTHON_INSTALL_DIR="${RUNNER_TEMP}/tutti-runtime-python"
          uv python install --no-bin "${PYTHON_VERSION}"
          python_root="$(find "${UV_PYTHON_INSTALL_DIR}" -mindepth 1 -maxdepth 1 -type d ! -name '.temp' | sort | head -n 1)"
          if [ -z "${python_root}" ] || ! find "${python_root}/bin" -maxdepth 1 -type f -perm -111 -name 'python3*' | grep -q .; then
            echo "uv did not install a usable Python runtime" >&2
            exit 1
          fi
          echo "PYTHON_ROOT=${python_root}" >> "$GITHUB_ENV"

      - name: Download Node.js
        shell: bash
        env:
          NODE_DISTRIBUTION: ${{ matrix.node_distribution }}
          NODE_RELEASE_BASE_URL: ${{ steps.lock.outputs.node_release_base_url }}
          NODE_VERSION: ${{ steps.lock.outputs.node_version }}
        run: |
          node_archive="node-v${NODE_VERSION}-${NODE_DISTRIBUTION}.tar.gz"
          mkdir -p "${RUNNER_TEMP}/tutti-runtime-node"
          curl --retry 3 --retry-delay 2 -fsSLo "${RUNNER_TEMP}/${node_archive}" "${NODE_RELEASE_BASE_URL}/${node_archive}"
          curl --retry 3 --retry-delay 2 -fsSLo "${RUNNER_TEMP}/SHASUMS256.txt" "${NODE_RELEASE_BASE_URL}/SHASUMS256.txt"
          (cd "${RUNNER_TEMP}" && grep "  ${node_archive}$" SHASUMS256.txt | shasum -a 256 -c -)
          tar -xzf "${RUNNER_TEMP}/${node_archive}" -C "${RUNNER_TEMP}/tutti-runtime-node" --strip-components=1
          if [ ! -x "${RUNNER_TEMP}/tutti-runtime-node/bin/node" ] || [ ! -x "${RUNNER_TEMP}/tutti-runtime-node/bin/npm" ]; then
            echo "Node.js archive does not contain node and npm" >&2
            exit 1
          fi

      - name: Assemble runtime artifacts
        shell: bash
        env:
          NODE_VERSION: ${{ steps.lock.outputs.node_version }}
          PLATFORM: ${{ matrix.platform }}
          PYTHON_VERSION: ${{ steps.lock.outputs.python_version }}
          RUNTIME_VERSION: ${{ steps.lock.outputs.runtime_version }}
        run: |
          artifact_dir="${GITHUB_WORKSPACE}/tutti-app-runtime/${RUNTIME_VERSION}/${PLATFORM}"
          python_staging="${RUNNER_TEMP}/tutti-app-runtime-python"
          node_staging="${RUNNER_TEMP}/tutti-app-runtime-node-artifact"
          python_artifact_dir="${artifact_dir}/python"
          node_artifact_dir="${artifact_dir}/node"
          python_artifact_file="tutti-app-runtime-python-${PLATFORM}-${RUNTIME_VERSION}.zip"
          node_artifact_file="tutti-app-runtime-node-${PLATFORM}-${RUNTIME_VERSION}.zip"
          mkdir -p "${python_staging}/python" "${node_staging}/node" "${python_artifact_dir}" "${node_artifact_dir}"
          rsync -aL "${PYTHON_ROOT}/" "${python_staging}/python/"
          rsync -aL "${RUNNER_TEMP}/tutti-runtime-node/" "${node_staging}/node/"
          if [ ! -x "${python_staging}/python/bin/python3" ]; then
            python_executable="$(find "${python_staging}/python/bin" -maxdepth 1 -type f -perm -111 -name 'python3*' | sort | head -n 1)"
            cp "${python_executable}" "${python_staging}/python/bin/python3"
          fi
          cat > "${node_staging}/node/bin/npm" <<'SH'
          #!/bin/sh
          script_dir="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec "${script_dir}/node" "${script_dir}/../lib/node_modules/npm/bin/npm-cli.js" "$@"
          SH
          cat > "${node_staging}/node/bin/npx" <<'SH'
          #!/bin/sh
          script_dir="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec "${script_dir}/node" "${script_dir}/../lib/node_modules/npm/bin/npx-cli.js" "$@"
          SH
          chmod 0755 "${node_staging}/node/bin/npm" "${node_staging}/node/bin/npx"
          test -x "${python_staging}/python/bin/python3"
          test -x "${node_staging}/node/bin/node"
          test -x "${node_staging}/node/bin/npm"
          test -x "${node_staging}/node/bin/npx"
          PATH="${node_staging}/node/bin:${PATH}" "${node_staging}/node/bin/npm" --version
          PATH="${node_staging}/node/bin:${PATH}" "${node_staging}/node/bin/npx" --version
          find "${python_staging}" "${node_staging}" -exec touch -h -t 202606010000 {} +
          (cd "${python_staging}" && zip -X -qry "${python_artifact_dir}/${python_artifact_file}" .)
          (cd "${node_staging}" && zip -X -qry "${node_artifact_dir}/${node_artifact_file}" .)
          python_artifact_sha256="$(shasum -a 256 "${python_artifact_dir}/${python_artifact_file}" | awk '{print $1}')"
          node_artifact_sha256="$(shasum -a 256 "${node_artifact_dir}/${node_artifact_file}" | awk '{print $1}')"
          python_artifact_size="$(wc -c < "${python_artifact_dir}/${python_artifact_file}" | tr -d ' ')"
          node_artifact_size="$(wc -c < "${node_artifact_dir}/${node_artifact_file}" | tr -d ' ')"
          cat > "${artifact_dir}/metadata.json" <<JSON
          {
            "schemaVersion": "tutti.app.runtime-platform.v2",
            "runtimeVersion": "${RUNTIME_VERSION}",
            "platform": "${PLATFORM}",
            "pythonVersion": "${PYTHON_VERSION}",
            "nodeVersion": "${NODE_VERSION}",
            "components": {
              "python": {
                "version": "${PYTHON_VERSION}",
                "artifactPath": "${RUNTIME_VERSION}/${PLATFORM}/python/${python_artifact_file}",
                "artifactSha256": "${python_artifact_sha256}",
                "artifactSizeBytes": ${python_artifact_size}
              },
              "node": {
                "version": "${NODE_VERSION}",
                "artifactPath": "${RUNTIME_VERSION}/${PLATFORM}/node/${node_artifact_file}",
                "artifactSha256": "${node_artifact_sha256}",
                "artifactSizeBytes": ${node_artifact_size}
              }
            },
            "profiles": {
              "baseline": ["python", "node"],
              "node-static": ["node"]
            }
          }
          JSON

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: tutti-app-runtime-${{ matrix.platform }}
          path: tutti-app-runtime/${{ steps.lock.outputs.runtime_version }}/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    name: Publish runtime catalog
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_REGION_VALUE: ${{ inputs.aws_region || vars.TUTTI_APP_RUNTIME_AWS_REGION || vars.TUTTI_APP_RELEASES_AWS_REGION }}
      AWS_ROLE_ARN_VALUE: ${{ inputs.aws_role_arn || vars.TUTTI_APP_RUNTIME_AWS_ROLE_ARN || vars.TUTTI_APP_RELEASES_AWS_ROLE_ARN }}
      S3_BUCKET_VALUE: ${{ inputs.s3_bucket || vars.TUTTI_APP_RUNTIME_S3_BUCKET || vars.TUTTI_APP_RELEASES_S3_BUCKET }}
      S3_PREFIX_VALUE: ${{ inputs.s3_prefix || vars.TUTTI_APP_RUNTIME_S3_PREFIX || 'tutti-app-runtimes' }}
      ARTIFACT_BASE_URL_VALUE: ${{ inputs.artifact_base_url || vars.TUTTI_APP_RUNTIME_ARTIFACT_BASE_URL }}
      CLOUDFRONT_DISTRIBUTION_ID_VALUE: ${{ inputs.cloudfront_distribution_id || vars.TUTTI_APP_RUNTIME_CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tutti-app-runtime-*
          path: downloaded-tutti-app-runtime
          merge-multiple: false

      - name: Restore runtime artifact layout
        shell: bash
        run: |
          rm -rf tutti-app-runtime
          mkdir -p tutti-app-runtime
          while IFS= read -r metadata_file; do
            runtime_version="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).runtimeVersion)" "${metadata_file}")"
            platform="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).platform)" "${metadata_file}")"
            target_dir="tutti-app-runtime/${runtime_version}/${platform}"
            mkdir -p "${target_dir}"
            cp -R "$(dirname "${metadata_file}")/." "${target_dir}/"
          done < <(find downloaded-tutti-app-runtime -name metadata.json -type f | sort)
          metadata_count="$(find tutti-app-runtime -name metadata.json -type f | wc -l | tr -d ' ')"
          if [ "${metadata_count}" -eq 0 ]; then
            echo "No runtime metadata files were downloaded" >&2
            exit 1
          fi
          echo "Restored ${metadata_count} runtime artifact metadata files."

      - name: Validate AWS configuration
        shell: bash
        run: |
          missing=()
          for name in AWS_REGION_VALUE AWS_ROLE_ARN_VALUE S3_BUCKET_VALUE ARTIFACT_BASE_URL_VALUE; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required AWS configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          role-to-assume: ${{ env.AWS_ROLE_ARN_VALUE }}

      - name: Build runtime catalog
        shell: bash
        run: |
          metadata_args=()
          while IFS= read -r metadata_file; do
            metadata_args+=(--metadata-file "${metadata_file}")
          done < <(find tutti-app-runtime -name metadata.json -type f | sort)
          if [ "${#metadata_args[@]}" -eq 0 ]; then
            echo "No runtime metadata files were downloaded" >&2
            exit 1
          fi
          node tools/scripts/build-tutti-app-runtime-catalog.mjs \
            --artifact-base-url "${ARTIFACT_BASE_URL_VALUE%/}" \
            "${metadata_args[@]}" \
            --output tutti-app-runtime/catalog.json

      - name: Upload runtime artifacts to S3
        shell: bash
        run: |
          if [ -z "${S3_BUCKET_VALUE}" ]; then
            echo "S3 bucket is required" >&2
            exit 1
          fi
          prefix="${S3_PREFIX_VALUE%/}"
          if [ -n "${prefix}" ]; then
            s3_root="s3://${S3_BUCKET_VALUE}/${prefix}"
          else
            s3_root="s3://${S3_BUCKET_VALUE}"
          fi
          find tutti-app-runtime -name 'tutti-app-runtime-*-*.zip' -type f | sort | while IFS= read -r artifact; do
            relative_path="${artifact#tutti-app-runtime/}"
            aws s3 cp "${artifact}" "${s3_root}/${relative_path}" \
              --content-type "application/zip" \
              --cache-control "public, max-age=31536000, immutable"
          done

      - name: Upload runtime catalog to S3
        shell: bash
        run: |
          prefix="${S3_PREFIX_VALUE%/}"
          if [ -n "${prefix}" ]; then
            s3_target="s3://${S3_BUCKET_VALUE}/${prefix}/catalog.json"
          else
            s3_target="s3://${S3_BUCKET_VALUE}/catalog.json"
          fi
          aws s3 cp tutti-app-runtime/catalog.json "${s3_target}" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"

      - name: Invalidate CloudFront runtime catalog
        if: env.CLOUDFRONT_DISTRIBUTION_ID_VALUE != ''
        shell: bash
        run: |
          prefix="${S3_PREFIX_VALUE%/}"
          if [ -n "${prefix}" ]; then
            path_to_invalidate="/${prefix}/catalog.json"
          else
            path_to_invalidate="/catalog.json"
          fi
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID_VALUE}" \
            --paths "${path_to_invalidate}"
