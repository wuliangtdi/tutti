name: Publish Tutti App Release

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
      package_command:
        required: false
        type: string
        default: ""
      package_dir:
        required: false
        type: string
        default: ""
      icon_path:
        required: false
        type: string
        default: ""
      release_tag_prefix:
        required: false
        type: string
        default: ""
      release_bump:
        required: false
        type: string
        default: ""
      create_release_tag:
        required: false
        type: boolean
        default: false
      runner:
        required: false
        type: string
        default: ubuntu-latest
      node_version:
        required: false
        type: string
        default: "24"
      pnpm_version:
        required: false
        type: string
        default: "10.11.0"
      release_tools_package:
        required: false
        type: string
        default: "@tutti-os/app-release-tools@latest"
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string
      s3_bucket:
        required: true
        type: string
      s3_prefix:
        required: false
        type: string
        default: ""
      release_assets_base_url:
        required: false
        type: string
        default: ""
      publish_catalog:
        required: false
        type: boolean
        default: false
      catalog_only:
        required: false
        type: boolean
        default: false
      catalog_cloudfront_distribution_id:
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: ${{ inputs.catalog_only || !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: ${{ inputs.runner }}
    concurrency:
      group: ${{ (inputs.publish_catalog || inputs.catalog_only) && format('tutti-app-catalog-{0}-{1}', inputs.s3_bucket, inputs.s3_prefix) || format('tutti-app-release-{0}-{1}', inputs.app_id, github.ref_name) }}
      cancel-in-progress: false

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v6

      - name: Validate release inputs
        if: ${{ !inputs.catalog_only }}
        shell: bash
        env:
          PACKAGE_COMMAND: ${{ inputs.package_command }}
          PACKAGE_DIR: ${{ inputs.package_dir }}
          RELEASE_ASSETS_BASE_URL: ${{ inputs.release_assets_base_url }}
          RELEASE_BUMP: ${{ inputs.release_bump }}
          CREATE_RELEASE_TAG: ${{ inputs.create_release_tag }}
        run: |
          if [ -z "${PACKAGE_COMMAND}" ]; then
            echo "package_command is required unless catalog_only is true." >&2
            exit 1
          fi
          if [ -z "${PACKAGE_DIR}" ]; then
            echo "package_dir is required unless catalog_only is true." >&2
            exit 1
          fi
          if [ -z "${RELEASE_ASSETS_BASE_URL}" ]; then
            echo "release_assets_base_url is required unless catalog_only is true." >&2
            exit 1
          fi
          if [ -n "${RELEASE_BUMP}" ] && [[ ! "${RELEASE_BUMP}" =~ ^(major|minor|patch)$ ]]; then
            echo "release_bump must be one of major, minor, or patch when provided." >&2
            exit 1
          fi
          if [ -n "${RELEASE_BUMP}" ] && [ "${CREATE_RELEASE_TAG}" != "true" ]; then
            echo "release_bump requires create_release_tag." >&2
            exit 1
          fi
          if [ "${CREATE_RELEASE_TAG}" = "true" ] && [ -z "${RELEASE_BUMP}" ]; then
            echo "create_release_tag requires release_bump." >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install app dependencies
        if: ${{ !inputs.catalog_only }}
        run: pnpm install --frozen-lockfile

      - name: Build app package
        if: ${{ !inputs.catalog_only }}
        run: ${{ inputs.package_command }}

      - name: Resolve release version
        if: ${{ !inputs.catalog_only }}
        id: release
        shell: bash
        env:
          RELEASE_TAG_PREFIX: ${{ inputs.release_tag_prefix }}
          RELEASE_BUMP: ${{ inputs.release_bump }}
          CREATE_RELEASE_TAG: ${{ inputs.create_release_tag }}
          APP_ID: ${{ inputs.app_id }}
          PACKAGE_DIR: ${{ inputs.package_dir }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const semverPattern = /^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;
          const stableSemverPattern = /^([0-9]+)\.([0-9]+)\.([0-9]+)$/;

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          function output(name, value) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`);
          }

          function defaultTagPrefix() {
            return process.env.RELEASE_TAG_PREFIX || `${process.env.APP_ID}-v`;
          }

          function parseStableVersion(version, source) {
            const match = version.match(stableSemverPattern);
            if (!match) {
              return null;
            }
            return {
              source,
              version,
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3])
            };
          }

          function compareVersions(left, right) {
            for (const key of ["major", "minor", "patch"]) {
              if (left[key] !== right[key]) {
                return left[key] - right[key];
              }
            }
            return 0;
          }

          function nextVersionFromSources(prefix, bump, manifestVersion) {
            execFileSync("git", ["fetch", "--tags", "--force"], { stdio: "inherit" });
            const tags = execFileSync("git", ["tag", "--list"], { encoding: "utf8" })
              .split("\n")
              .map((tag) => tag.trim())
              .filter((tag) => tag.startsWith(prefix));
            const manifestSeed = parseStableVersion(
              manifestVersion,
              "package manifest"
            );
            if (!manifestSeed) {
              fail(`Package manifest version must be stable semver x.y.z when release_bump is used, got ${manifestVersion}.`);
            }
            const tagSeeds = tags
              .map((tag) => parseStableVersion(tag.slice(prefix.length), `tag ${tag}`))
              .filter(Boolean);
            const latest = [manifestSeed, ...tagSeeds].sort(compareVersions).at(-1) ?? {
              source: "default",
              version: "0.0.0",
              major: 0,
              minor: 0,
              patch: 0
            };
            console.log(`Resolved release version seed ${latest.version} from ${latest.source}.`);

            if (bump === "major") {
              return `${latest.major + 1}.0.0`;
            }
            if (bump === "minor") {
              return `${latest.major}.${latest.minor + 1}.0`;
            }
            if (bump === "patch") {
              return `${latest.major}.${latest.minor}.${latest.patch + 1}`;
            }
            fail(`release_bump must be one of major, minor, or patch when provided, got ${bump}.`);
          }

          const gitSha = execFileSync("git", ["rev-parse", "HEAD"], {
            encoding: "utf8"
          }).trim();
          const releaseBump = process.env.RELEASE_BUMP;
          const shouldCreateTag = process.env.CREATE_RELEASE_TAG === "true";
          const manifest = JSON.parse(
            fs.readFileSync(`${process.env.PACKAGE_DIR}/tutti.app.json`, "utf8")
          );
          let releaseVersion = "";
          let tagName = "";

          if (releaseBump) {
            const tagPrefix = defaultTagPrefix();
            releaseVersion = nextVersionFromSources(
              tagPrefix,
              releaseBump,
              manifest.version
            );
            tagName = `${tagPrefix}${releaseVersion}`;
          } else {
            if (shouldCreateTag) {
              fail("create_release_tag requires release_bump.");
            }
            releaseVersion = `${manifest.version}+${gitSha.slice(0, 12)}`;
          }

          if (!semverPattern.test(releaseVersion)) {
            fail(`Release version must be semver x.y.z with optional prerelease/build metadata, got ${releaseVersion}.`);
          }

          output("version", releaseVersion);
          output("git_sha", gitSha);
          output("tag_name", tagName);
          NODE

      - name: Build release metadata
        if: ${{ !inputs.catalog_only }}
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          PACKAGE_DIR: ${{ inputs.package_dir }}
          ICON_PATH: ${{ inputs.icon_path }}
          RELEASE_TOOLS_PACKAGE: ${{ inputs.release_tools_package }}
          RELEASE_ASSETS_BASE_URL: ${{ inputs.release_assets_base_url }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          args=(
            --app-id "${APP_ID}"
            --package-dir "${PACKAGE_DIR}"
            --output-dir tutti-app-release
            --base-url "${RELEASE_ASSETS_BASE_URL}"
            --version "${RELEASE_VERSION}"
            --git-sha "${{ steps.release.outputs.git_sha }}"
          )
          if [ -n "${ICON_PATH}" ]; then
            args+=(--icon-path "${ICON_PATH}")
          fi
          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx build-tutti-app-release "${args[@]}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_arn }}

      - name: Upload app release to S3
        if: ${{ !inputs.catalog_only }}
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          S3_PREFIX: ${{ inputs.s3_prefix }}
        run: |
          local_release_file="tutti-app-release/apps/${APP_ID}/${RELEASE_VERSION}/release.json"

          prefix="${S3_PREFIX%/}"
          if [ -n "${prefix}" ]; then
            s3_root="s3://${S3_BUCKET}/${prefix}"
            release_key="${prefix}/apps/${APP_ID}/${RELEASE_VERSION}/release.json"
          else
            s3_root="s3://${S3_BUCKET}"
            release_key="apps/${APP_ID}/${RELEASE_VERSION}/release.json"
          fi

          if aws s3api head-object --bucket "${S3_BUCKET}" --key "${release_key}" >/dev/null 2>tutti-app-release-head-error.txt; then
            mkdir -p tutti-app-release/existing
            aws s3 cp "${s3_root}/apps/${APP_ID}/${RELEASE_VERSION}/release.json" tutti-app-release/existing/release.json
            node -e '
              const fs = require("fs");
              const localRelease = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              const existingRelease = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
              const comparedKeys = [
                "appId",
                "version",
                "artifactUrl",
                "artifactSha256",
                "artifactSizeBytes",
                "iconUrl",
                "gitSha"
              ];
              const mismatches = comparedKeys.filter(
                (key) => localRelease[key] !== existingRelease[key]
              );
              if (mismatches.length > 0) {
                console.error(
                  `Release ${localRelease.version} already exists for ${localRelease.appId} with different immutable metadata: ${mismatches.join(", ")}`
                );
                process.exit(1);
              }
            ' "${local_release_file}" tutti-app-release/existing/release.json
            echo "Release ${RELEASE_VERSION} already exists for ${APP_ID} with matching immutable metadata. Repairing mutable latest/catalog state."
          elif grep -Eq "(404|Not Found|NotFound|NoSuchKey)" tutti-app-release-head-error.txt; then
            aws s3 sync "tutti-app-release/apps/${APP_ID}/${RELEASE_VERSION}/" "${s3_root}/apps/${APP_ID}/${RELEASE_VERSION}/" \
              --cache-control "public, max-age=31536000, immutable"
          else
            echo "Failed to check existing release ${release_key}." >&2
            cat tutti-app-release-head-error.txt >&2
            exit 1
          fi

          aws s3 cp "tutti-app-release/apps/${APP_ID}/latest.json" "${s3_root}/apps/${APP_ID}/latest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"

      - name: Verify published app release artifact
        if: ${{ !inputs.catalog_only }}
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          RELEASE_TOOLS_PACKAGE: ${{ inputs.release_tools_package }}
        run: |
          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx verify-tutti-app-release-artifacts \
            --release-file "tutti-app-release/apps/${APP_ID}/latest.json"

      - name: Create release tag
        if: ${{ !inputs.catalog_only && inputs.create_release_tag }}
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_GIT_SHA: ${{ steps.release.outputs.git_sha }}
        run: |
          if [ -z "${RELEASE_TAG_NAME}" ]; then
            echo "Resolved release tag name is empty." >&2
            exit 1
          fi
          if ! git check-ref-format "refs/tags/${RELEASE_TAG_NAME}"; then
            echo "Resolved release tag ${RELEASE_TAG_NAME} is not a valid git ref." >&2
            exit 1
          fi

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG_NAME}" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_TAG_NAME}")"
            if [ "${existing_sha}" != "${RELEASE_GIT_SHA}" ]; then
              echo "Release tag ${RELEASE_TAG_NAME} already points to ${existing_sha}, expected ${RELEASE_GIT_SHA}." >&2
              exit 1
            fi
            echo "Release tag ${RELEASE_TAG_NAME} already exists for ${APP_ID} ${RELEASE_VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG_NAME}" "${RELEASE_GIT_SHA}" -m "Release ${APP_ID} ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG_NAME}"

      - name: Publish app catalog
        if: ${{ inputs.publish_catalog || inputs.catalog_only }}
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          CATALOG_ONLY: ${{ inputs.catalog_only }}
          RELEASE_TOOLS_PACKAGE: ${{ inputs.release_tools_package }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          S3_PREFIX: ${{ inputs.s3_prefix }}
        run: |
          mkdir -p tutti-app-catalog/releases

          prefix="${S3_PREFIX%/}"
          catalog_key="catalog.json"
          if [ -n "${prefix}" ]; then
            s3_root="s3://${S3_BUCKET}/${prefix}"
            catalog_key="${prefix}/catalog.json"
          else
            s3_root="s3://${S3_BUCKET}"
          fi

          catalog_args=()
          if aws s3api head-object --bucket "${S3_BUCKET}" --key "${catalog_key}" >/dev/null 2>tutti-app-catalog/head-error.txt; then
            aws s3 cp "${s3_root}/catalog.json" tutti-app-catalog/existing-catalog.json
            catalog_args+=(--existing-catalog tutti-app-catalog/existing-catalog.json)
          elif grep -Eq "(404|Not Found|NotFound|NoSuchKey)" tutti-app-catalog/head-error.txt; then
            echo "No existing catalog found. Publishing a catalog with ${APP_ID}." >&2
          else
            echo "Failed to check existing catalog. Refusing to publish a partial merge catalog." >&2
            cat tutti-app-catalog/head-error.txt >&2
            exit 1
          fi

          if [ "${CATALOG_ONLY}" = "true" ]; then
            release_file="tutti-app-catalog/releases/${APP_ID}.json"
            aws s3 cp "${s3_root}/apps/${APP_ID}/latest.json" "${release_file}"
          else
            release_file="tutti-app-release/apps/${APP_ID}/latest.json"
          fi

          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx build-tutti-app-catalog \
            "${catalog_args[@]}" \
            --release-file "${release_file}" \
            --output tutti-app-catalog/catalog.json
          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx verify-tutti-app-release-artifacts \
            --catalog-file tutti-app-catalog/catalog.json \
            --release-file "${release_file}"
          aws s3 cp tutti-app-catalog/catalog.json "${s3_root}/catalog.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"

      - name: Invalidate app catalog
        if: ${{ (inputs.publish_catalog || inputs.catalog_only) && inputs.catalog_cloudfront_distribution_id != '' }}
        shell: bash
        env:
          CATALOG_CLOUDFRONT_DISTRIBUTION_ID: ${{ inputs.catalog_cloudfront_distribution_id }}
          S3_PREFIX: ${{ inputs.s3_prefix }}
        run: |
          prefix="${S3_PREFIX%/}"
          if [ -n "${prefix}" ]; then
            path_to_invalidate="/${prefix}/catalog.json"
          else
            path_to_invalidate="/catalog.json"
          fi
          aws cloudfront create-invalidation \
            --distribution-id "${CATALOG_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "${path_to_invalidate}"
