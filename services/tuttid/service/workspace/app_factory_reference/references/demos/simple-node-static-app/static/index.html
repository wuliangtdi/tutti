<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f7f8fb;
        color: #151922;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          background: #111318;
          color: #f4f6fb;
        }
      }

      body {
        margin: 0;
      }

      main {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 20px;
        color: color-mix(in srgb, currentColor 72%, transparent);
      }

      pre {
        box-sizing: border-box;
        overflow: auto;
        max-width: 720px;
        padding: 16px;
        border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
        border-radius: 8px;
        background: color-mix(in srgb, currentColor 6%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Simple Demo</h1>
      <p id="summary">Reading durable app state from the data directory.</p>
      <pre id="state">Loading...</pre>
    </main>
    <script>
      const copyByLanguage = {
        en: {
          title: "Simple Demo",
          summary: "Reading durable app state from the data directory.",
          loading: "Loading..."
        },
        zh: {
          title: "简单演示",
          summary: "从应用数据目录读取持久化状态。",
          loading: "正在加载..."
        }
      };
      let stateLoaded = false;

      function normalizeLanguage(value) {
        return String(value || "")
          .trim()
          .replace(/_/g, "-")
          .toLowerCase()
          .split("-")[0];
      }

      async function readHostLocale() {
        const getContext = window.tuttiExternal?.app?.getContext;
        if (typeof getContext !== "function") return null;
        try {
          const context = await getContext();
          return context?.locale || context?.language || null;
        } catch {
          return null;
        }
      }

      function subscribeHostLocale(listener) {
        const subscribe = window.tuttiExternal?.app?.subscribe;
        if (typeof subscribe !== "function") return () => {};
        return subscribe((context) => {
          listener(context?.locale || context?.language || null);
        });
      }

      function applyLocale(locale) {
        const browserLocale =
          navigator.languages?.[0] ||
          navigator.language ||
          document.documentElement.lang;
        const language = normalizeLanguage(locale || browserLocale);
        const copy = copyByLanguage[language] || copyByLanguage.en;
        document.documentElement.lang = language || "en";
        document.querySelector("#title").textContent = copy.title;
        document.querySelector("#summary").textContent = copy.summary;
        if (!stateLoaded) {
          document.querySelector("#state").textContent = copy.loading;
        }
      }

      async function loadState() {
        try {
          const response = await fetch("/api/state");
          const state = await response.json();
          stateLoaded = true;
          document.querySelector("#state").textContent = JSON.stringify(
            state,
            null,
            2
          );
        } catch (error) {
          stateLoaded = true;
          document.querySelector("#state").textContent = error.message;
        }
      }

      readHostLocale().then(applyLocale).then(loadState);
      subscribeHostLocale(applyLocale);
    </script>
  </body>
</html>
