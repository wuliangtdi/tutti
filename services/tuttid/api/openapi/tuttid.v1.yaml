    post:
      operationId: searchWorkspaceAppReferences
      tags:
        - app-center
      summary: Search file references exposed by one running workspace app
      description: >
        Proxies a recursive reference search request to a running workspace app
        and returns daemon-resolved file references ordered by relevance. Unlike
        the list filterText, search spans the whole app reference tree and never
        returns groups. Workspace app runtimes return scoped locations to the
        daemon; this public daemon API returns absolute file paths that desktop
        clients can use as ordinary file links.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppReferenceSearchRequest"
      responses:
        "200":
          description: Workspace app reference search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppReferenceSearchResponse"
