components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    CliCommandID:
      name: commandID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceID:
      name: workspaceID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceAppID:
      name: appID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceAppFactoryJobID:
      name: jobID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceFilePath:
      name: path
      in: query
      description: Omit to resolve the current workspace file root.
      required: false
      schema:
        type: string
        minLength: 1
    WorkspaceFileIncludeHidden:
      name: includeHidden
      in: query
      required: false
      schema:
        type: boolean
        default: false
    WorkspaceFilePrefetchDepth:
      name: prefetchDepth
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 8
        default: 4
    WorkspaceFilePrefetchBudgetMs:
      name: prefetchBudgetMs
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 500
    WorkspaceFileSearchQuery:
      name: query
      in: query
      required: true
      schema:
        type: string
    WorkspaceFileSearchWithin:
      name: within
      in: query
      required: false
      description: >-
        可选:把搜索限定在工作区根下的某子路径(对应左栏选中的「位置」,如
        文稿/下载/桌面)。相对工作区根的逻辑路径;缺省/空 = 跨整根搜索。
      schema:
        type: string
        minLength: 1
    WorkspaceFileSearchLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 30
    WorkspaceFileRecentLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    WorkspaceFileSearchKinds:
      name: includeKinds
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/WorkspaceFileFilterKind"
    WorkspaceFileSearchFilters:
      name: filters
      in: query
      required: false
      style: form
      explode: true
      description: >-
        已选「文件类型筛选分类」id(全局统一口径:image/video/document/
        webpage/other)。筛选与搜索是同一能力:query 可空、filters
        非空时即按类型 list-all。空/缺省 = 不按类型过滤。
      schema:
        type: array
        items:
          type: string
    TerminalID:
      name: terminalID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AgentSessionID:
      name: agentSessionID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AgentSessionAttachmentID:
      name: attachmentID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AgentPermissionRequestID:
      name: requestID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TerminalAfterSeq:
      name: afterSeq
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
  responses:
    UnauthorizedError:
      description: Bearer token is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            unauthorized:
              value:
                error:
                  code: unauthorized
                  reason: missing_or_invalid_token
                  developerMessage: daemon request is not authorized
    InvalidRequestError:
      description: Request payload or parameters are invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            invalidRequest:
              value:
                error:
                  code: invalid_request
                  reason: missing_workspace_id
                  developerMessage: workspace id is required
    MethodNotAllowedError:
      description: HTTP method is not supported on this route
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            methodNotAllowed:
              value:
                error:
                  code: method_not_allowed
                  reason: method_not_allowed
                  developerMessage: method not allowed
    ServiceUnavailableError:
      description: Required daemon service dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            serviceUnavailable:
              value:
                error:
                  code: service_unavailable
                  reason: workspace_service_unavailable
                  developerMessage: workspace service is unavailable
    WorkspaceNotFoundError:
      description: Workspace id was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceNotFound:
              value:
                error:
                  code: workspace_not_found
                  reason: workspace_not_found
                  developerMessage: workspace not found
    WorkspaceFileNotFoundError:
      description: Workspace file entry was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceFileNotFound:
              value:
                error:
                  code: workspace_file_not_found
                  reason: workspace_file_not_found
                  developerMessage: workspace file entry not found
    WorkspaceTerminalNotFoundError:
      description: Workspace terminal session was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceTerminalNotFound:
              value:
                error:
                  code: workspace_terminal_not_found
                  reason: workspace_terminal_not_found
                  developerMessage: workspace terminal session not found
    WorkspaceAppNotFoundError:
      description: Workspace app was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceAppNotFound:
              value:
                error:
                  code: workspace_app_not_found
                  reason: workspace_app_not_found
                  developerMessage: workspace app not found
    WorkspaceOperationError:
      description: Workspace operation failed in an upstream adapter or command
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceOperationFailed:
              value:
                error:
                  code: workspace_operation_failed
                  reason: workspace_operation_failed
                  developerMessage: workspace operation failed
    PreferencesOperationError:
      description: Desktop preferences operation failed in an upstream adapter or command
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            preferencesOperationFailed:
              value:
                error:
                  code: preferences_operation_failed
                  reason: preferences_operation_failed
                  developerMessage: desktop preferences operation failed
  schemas:
    HealthStatusResponse:
      type: object
      additionalProperties: false
      required:
        - service
        - status
      properties:
        service:
          type: string
        status:
          type: string
          enum:
            - ok
    TrackEventsRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/TrackEvent"
    TrackEvent:
      type: object
      additionalProperties: false
      required:
        - name
        - client_ts
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[a-z][a-z0-9_]*(?:\\.[a-z][a-z0-9_]*)+$"
        client_ts:
          type: integer
          format: int64
          minimum: 1
        params:
          type: object
          additionalProperties: true
    CliOutputMode:
      type: string
      enum:
        - table
        - json
        - plain
        - markdown
    CliTableColumn:
      type: object
      description: Machine-readable table column metadata for clients that render command output.
      additionalProperties: false
      required:
        - key
        - label
      properties:
        key:
          type: string
          minLength: 1
        label:
          type: string
          description: Human-readable fallback label supplied by the protocol for terminal rendering.
          minLength: 1
    CliTableOutput:
      type: object
      additionalProperties: false
      required:
        - columns
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/CliTableColumn"
    CliCapabilityOutput:
      type: object
      additionalProperties: false
      required:
        - defaultMode
        - json
      properties:
        defaultMode:
          $ref: "#/components/schemas/CliOutputMode"
        json:
          type: boolean
        table:
          allOf:
            - $ref: "#/components/schemas/CliTableOutput"
