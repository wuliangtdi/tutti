openapi: 3.0.3
info:
  title: tuttid API
  version: 0.1.0
  description: Versioned local daemon API for tutti desktop, CLI, and approved local integrations.
x-tutti-openapi-fragments:
  - packages/workspace/issue-manager/openapi/issue-manager.v1.yaml
servers:
  - url: http://127.0.0.1:4545
security:
  - bearerAuth: []
tags:
  - name: runtime
  - name: analytics
  - name: cli
    description: Public local capability protocol for the bundled CLI and future approved local integrations. Command metadata is machine-readable protocol data; command execution remains authorized by the daemon bearer token and filtered by daemon-owned context.
  - name: preferences
  - name: workspace
  - name: terminal
  - name: agent-session
  - name: agent-context
  - name: app-center
  - name: app-factory
  - name: user-project
paths:
  /v1/health:
    get:
      operationId: getHealth
      tags:
        - runtime
      summary: Get daemon health status
      responses:
        "200":
          description: Daemon health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
  /v1/track:
    post:
      operationId: trackEvents
      tags:
        - analytics
      summary: Accept analytics events from approved local clients
      description: Accepts renderer-originated analytics events. Delivery to the analytics backend is handled asynchronously by tuttid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventsRequest"
      responses:
        "202":
          description: Analytics events accepted for asynchronous delivery
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/cli/capabilities:
    get:
      operationId: listCliCapabilities
      tags:
        - cli
      summary: List CLI capabilities visible in the current context
      description: Returns daemon-owned command metadata that clients can use to route user commands without duplicating business rules or workspace resolution.
      parameters:
        - name: workspaceID
          in: query
          required: false
          schema:
            type: string
          description: Optional workspace context. When omitted, the daemon uses the startup workspace.
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include capabilities hidden from ordinary CLI command discovery by provider availability filters and command visibility. Intended for metadata consumers, not ordinary user command routing.
        - name: includeIntegration
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include integration-only commands while preserving provider availability filters. Intended for app-runtime integrations.
      responses:
        "200":
          description: Visible CLI capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliCapabilitiesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/cli/commands/{commandID}/invoke:
    post:
      operationId: invokeCliCommand
      tags:
        - cli
      summary: Invoke one registered CLI command
      description: Invokes a daemon-owned capability by stable command id. The daemon validates context, resolves workspace state, applies edition filtering, and returns presentation-neutral command output.
      parameters:
        - $ref: "#/components/parameters/CliCommandID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliInvokeRequest"
      responses:
        "200":
          description: CLI command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliInvokeResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/agent-context/workspace-app-mentions:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: listWorkspaceAppMentionCandidates
      tags:
        - agent-context
      summary: List workspace app mention candidates for agent context pickers
      description: >
        Returns daemon-owned application mention candidates for Agent GUI and
        rich-text context pickers. Real workspace apps are filtered by App Center
        installation and enabled state. CLI capabilities only enrich search
        metadata; this endpoint does not run command-routing availability
        filters or agent provider auth checks.
      responses:
        "200":
          description: Workspace app mention candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppMentionCandidatesResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/preferences/desktop:
    get:
      operationId: getDesktopPreferences
      tags:
        - preferences
      summary: Get persisted desktop preferences
      responses:
        "200":
          description: Desktop preferences state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesktopPreferencesStateResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    put:
      operationId: putDesktopPreferences
      tags:
        - preferences
      summary: Persist desktop preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutDesktopPreferencesRequest"
      responses:
        "200":
          description: Desktop preferences persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesktopPreferencesStateResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects:
    get:
      operationId: listUserProjects
      tags:
        - user-project
      summary: List recently used user project directories
      responses:
        "200":
          description: User project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: useUserProject
      tags:
        - user-project
      summary: Record a user project directory usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UseUserProjectRequest"
      responses:
        "201":
          description: User project usage recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
      operationId: deleteUserProject
      tags:
        - user-project
      summary: Remove a user project directory from the recent project list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUserProjectRequest"
      responses:
        "204":
          description: User project removed
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects/check:
    post:
      operationId: checkUserProjectPath
      tags:
        - user-project
      summary: Check a user project directory path without recording usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckUserProjectPathRequest"
      responses:
        "200":
          description: User project path status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectPathCheckResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/events/ws:
    get:
      operationId: attachEventStream
      tags:
        - event-stream
      summary: Attach a WebSocket stream to daemon business events
      responses:
        "200":
          description: Event stream upgrade endpoint
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces:
    get:
      operationId: listWorkspaces
      tags:
        - workspace
      summary: List registered workspaces
      responses:
        "200":
          description: Workspace catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspacesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: createWorkspace
      tags:
        - workspace
      summary: Create a workspace record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/startup:
    get:
      operationId: getStartupWorkspace
      tags:
        - workspace
      summary: Resolve the workspace that should open on startup
      responses:
        "200":
          description: Startup workspace selection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupWorkspaceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: getWorkspace
      tags:
        - workspace
      summary: Get one workspace by id
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    patch:
      operationId: updateWorkspace
      tags:
        - workspace
      summary: Update one workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
      operationId: deleteWorkspace
      tags:
        - workspace
      summary: Delete one workspace
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/workbench:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: getWorkspaceWorkbench
      tags:
        - workspace
      summary: Get one workspace workbench snapshot
      responses:
        "200":
          description: Workspace workbench snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceWorkbenchResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    put:
      operationId: putWorkspaceWorkbench
      tags:
        - workspace
      summary: Persist one workspace workbench snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutWorkspaceWorkbenchRequest"
      responses:
        "200":
          description: Workspace workbench snapshot persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceWorkbenchResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: listWorkspaceApps
      tags:
        - app-center
      summary: List app catalog and installation state for one workspace
      responses:
        "200":
          description: Workspace apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/catalog/refresh:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: refreshWorkspaceAppCatalog
      tags:
        - app-center
      summary: Refresh the remote app catalog for one workspace
      responses:
        "200":
          description: Workspace apps after the refresh request was accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/import:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: importWorkspaceApp
      tags:
        - app-center
      summary: Import one workspace app package archive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportWorkspaceAppRequest"
      responses:
        "200":
          description: Workspace app package imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/load-local:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: loadLocalWorkspaceApp
      tags:
        - app-center
      summary: Load one unpacked local workspace app directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoadLocalWorkspaceAppRequest"
      responses:
        "200":
          description: Local workspace app loaded and installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/start-enabled:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: startEnabledWorkspaceApps
      tags:
        - app-center
      summary: Start enabled installed apps for one workspace
      responses:
        "200":
          description: Enabled workspace apps start attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/stop-all:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: stopAllWorkspaceApps
      tags:
        - app-center
      summary: Stop all running apps for one workspace
      responses:
        "200":
          description: Workspace apps stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/{appID}/install:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - $ref: "#/components/parameters/WorkspaceAppID"
    post:
      operationId: installWorkspaceApp
      tags:
        - app-center
      summary: Install one app in a workspace
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallWorkspaceAppRequest"
      responses:
        "200":
          description: Workspace app installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceAppNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/{appID}/reload-local:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - $ref: "#/components/parameters/WorkspaceAppID"
    post:
      operationId: reloadLocalWorkspaceApp
      tags:
        - app-center
      summary: Reload one unpacked local workspace app directory
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReloadLocalWorkspaceAppRequest"
      responses:
        "200":
          description: Local workspace app reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceAppNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/apps/{appID}/references/list:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - $ref: "#/components/parameters/WorkspaceAppID"
    post:
      operationId: listWorkspaceAppReferences
      tags:
        - app-center
      summary: List file references exposed by one running workspace app
      description: >
        Proxies a reference list request to a running workspace app and returns
        daemon-resolved file references. Workspace app runtimes return scoped
        locations to the daemon; this public daemon API returns absolute file
        paths that desktop clients can use as ordinary file links.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppReferenceListRequest"
      responses:
        "200":
          description: Workspace app reference list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppReferenceListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "404":
          $ref: "#/components/responses/WorkspaceAppNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
