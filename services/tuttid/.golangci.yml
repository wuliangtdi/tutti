version: "2"

run:
  relative-path-mode: gomod
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - nolintlint
    - staticcheck
    - unused
    - revive
  settings:
    forbidigo:
      forbid:
        - pattern: 'http\.DefaultClient'
          msg: "use packages/agent/daemon/httpx instead — it resolves the user's proxy per request"
        - pattern: 'http\.(Get|Head|Post|PostForm)$'
          msg: "use packages/agent/daemon/httpx instead — it resolves the user's proxy per request"
    revive:
      rules:
        - name: duplicated-imports
        - name: empty-block
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: file-length-limit
          arguments:
            - max: 800
              skip-comments: true
              skip-blank-lines: true
          exclude:
            - TEST
            - main.go
            - wiring.go
            - types/**
        - name: if-return
        - name: indent-error-flow
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
          arguments:
            - allow-regex: "^_"
        - name: unused-receiver
          arguments:
            - allow-regex: "^_"
        - name: useless-break
  exclusions:
    generated: lax
    warn-unused: false
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - forbidigo
