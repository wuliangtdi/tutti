                $ref: "#/components/schemas/IssueManagerIssueResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceIssueResourceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
