openapi: 3.0.3
info:
  title: Workspace Issue Manager API Fragment
  version: 1.0.0
tags:
  - name: issue
paths:
  /v1/workspaces/{workspaceID}/issue-topics:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: listWorkspaceIssueTopics
      tags:
        - issue
      summary: List issue-manager topics for one workspace
      responses:
        "200":
          description: Workspace issue topics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerTopicListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: createWorkspaceIssueTopic
      tags:
        - issue
      summary: Create one issue-manager topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueManagerTopicRequest"
      responses:
        "201":
          description: Workspace issue topic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerTopicResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/WorkspaceIssueResourceExistsError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/issue-topics/{topicID}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - $ref: "#/components/parameters/IssueManagerTopicID"
    patch:
      operationId: updateWorkspaceIssueTopic
      tags:
        - issue
      summary: Update one issue-manager topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueManagerTopicRequest"
      responses:
        "200":
          description: Workspace issue topic updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerTopicResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceIssueResourceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
      operationId: deleteWorkspaceIssueTopic
      tags:
        - issue
      summary: Delete one issue-manager topic
      responses:
        "200":
          description: Workspace issue topic deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIssueManagerTopicResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceIssueResourceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/WorkspaceIssueResourceExistsError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/issues:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: listWorkspaceIssues
      tags:
        - issue
      summary: List issue-manager issues for one workspace
      parameters:
        - $ref: "#/components/parameters/IssueManagerPageSize"
        - $ref: "#/components/parameters/IssueManagerPageToken"
        - $ref: "#/components/parameters/IssueManagerTopicIDQuery"
        - $ref: "#/components/parameters/IssueManagerStatusFilter"
        - $ref: "#/components/parameters/IssueManagerSearchQuery"
      responses:
        "200":
          description: Workspace issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerIssueListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: createWorkspaceIssue
      tags:
        - issue
      summary: Create one issue-manager issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueManagerIssueRequest"
      responses:
        "201":
          description: Workspace issue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerIssueResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/WorkspaceIssueResourceExistsError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/issue-references/search:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    post:
      operationId: searchWorkspaceIssueReferences
      tags:
        - issue
      summary: Search issue-manager output files across one workspace
      description: >
        Searches the produced output files of issue-manager runs by file name
        across one workspace. Optional issueId / topicId scope the search to one
        issue or topic. Returns a flat, recency-ordered list of file references
        (deduplicated by path) each annotated with its owning issue title; it
        never returns groups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueManagerReferenceSearchRequest"
      responses:
        "200":
          description: Workspace issue reference search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueManagerReferenceSearchResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/issues/{issueID}:
